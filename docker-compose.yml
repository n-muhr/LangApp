services:
  db:
    image: postgres:14-alpine
    container_name: langapp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langapp}
      POSTGRES_DB: ${POSTGRES_DB:-langapp}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langapp} -d ${POSTGRES_DB:-langapp}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: LangApp.API/Dockerfile
    container_name: langapp_api
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-langapp};Username=${POSTGRES_USER:-langapp};Password=${POSTGRES_PASSWORD:-langapp}
      - JWT_SECRET=${JWT_SECRET:-A_VERY_LONG_SECRET_KEY_FOR_DEV_AT_LEAST_32_CHARS}
      - JWT_ISSUER=${JWT_ISSUER:-LangApp}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-LangApp.Client}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: always

  client:
    build:
      context: .
      dockerfile: LangApp.Client/Dockerfile
    container_name: langapp_client
    ports:
      - "80:8080"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    restart: always

volumes:
  pg_data:
